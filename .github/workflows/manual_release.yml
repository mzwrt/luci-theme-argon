#
# Build and Release workflow for luci-theme-argon
#
# To use in your fork:
#   1. Go to Settings → Actions → General → Workflow permissions
#   2. Select "Read and write permissions" and save
#   3. Bump PKG_VERSION in Makefile and push to master, or
#      trigger manually via Actions → Build and Release → Run workflow
#

name: "Build and Release"

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even if this version tag already exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - "master"
    paths:
      - "Makefile"
      - "htdocs/**"
      - "root/**"
      - "ucode/**"

env:
  TZ: Asia/Shanghai
  PACKAGE: luci-theme-argon
  # Pinned to OpenWrt 24.10.0 (latest stable as of this writing).
  # To upgrade the SDK: update SDK_URL to the new tarball URL from
  # https://archive.openwrt.org/releases/<version>/targets/x86/64/
  # and bump SDK_CACHE_KEY suffix to bust the cache (e.g. feeds-v2).
  SDK_URL: https://archive.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
  # Change the suffix (e.g. v2, v3) to force a fresh SDK + feeds download
  SDK_CACHE_KEY: openwrt-sdk-24.10.0-x86-64-feeds-v2

jobs:
  # ── Job 1: read version from Makefile and decide whether to build ──────────
  check:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Makefile
        id: ver
        run: |
          ver=$(grep -oE 'PKG_VERSION:=[0-9.]+' Makefile | cut -d= -f2)
          echo "version=v${ver}" >> "$GITHUB_OUTPUT"
          echo "Package version: v${ver}"

      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${{ steps.ver.outputs.version }}"
          force="${{ inputs.force_release || 'false' }}"
          if [ "$force" = "true" ]; then
            echo "Force-release requested — will build regardless."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$ver" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $ver already exists — skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $ver not found — will build and publish."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: build with OpenWrt SDK and publish release ─────────────────────
  build:
    name: Build ipk
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/update releases and upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-venv \
            rsync unzip zlib1g-dev file wget zstd

      - name: Cache OpenWrt SDK (with feeds)
        id: cache_sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: ${{ env.SDK_CACHE_KEY }}

      - name: Download and extract SDK
        if: steps.cache_sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ env.SDK_URL }}" -O sdk.tar.zst
          mkdir -p sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
          rm sdk.tar.zst

      - name: Update feeds (first-time / cache-miss only)
        if: steps.cache_sdk.outputs.cache-hit != 'true'
        run: |
          cd sdk
          ./scripts/feeds update luci packages
          ./scripts/feeds install -a -p luci
          ./scripts/feeds install -a -p packages

      - name: Inject current package source into SDK
        # Always runs so the build uses the code from this commit,
        # even when the SDK itself is restored from cache.
        # rsync with --exclude=sdk avoids "cp into itself" since sdk/ lives
        # inside $GITHUB_WORKSPACE.
        run: |
          rm -rf "sdk/package/${{ env.PACKAGE }}"
          mkdir -p "sdk/package/${{ env.PACKAGE }}"
          rsync -a --exclude='.git' --exclude='sdk' "$GITHUB_WORKSPACE/" "sdk/package/${{ env.PACKAGE }}/"

      - name: Configure
        run: |
          cd sdk
          {
            echo "CONFIG_ALL_NONSHARED=n"
            echo "CONFIG_ALL_KMODS=n"
            echo "CONFIG_ALL=n"
            echo "CONFIG_AUTOREMOVE=n"
            echo "CONFIG_LUCI_LANG_zh_Hans=y"
            echo "CONFIG_PACKAGE_${{ env.PACKAGE }}=m"
          } > .config
          make defconfig

      - name: Compile
        run: |
          cd sdk
          make package/${{ env.PACKAGE }}/{clean,compile} -j$(nproc) V=s

      - name: Collect .ipk files
        run: |
          mkdir -p dist
          find sdk/bin -name "${{ env.PACKAGE }}*.ipk" -exec cp {} dist/ \;
          ls -lh dist/
          ipk_count=$(find dist -name '*.ipk' | wc -l)
          if [ "$ipk_count" -eq 0 ]; then
            echo "::error::No .ipk file found — compilation may have failed."
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE }}-${{ needs.check.outputs.version }}
          path: dist/*.ipk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: "luci-theme-argon ${{ needs.check.outputs.version }}"
          body: |
            ## luci-theme-argon ${{ needs.check.outputs.version }}

            Built with **OpenWrt SDK 24.10.0** for x86_64.

            ### Installation

            Transfer the `.ipk` file to your OpenWrt router and run:

            ```sh
            opkg install luci-theme-argon_*.ipk
            ```

            Or via one-liner (replace `<url>` with the asset link below):

            ```sh
            wget -O /tmp/luci-theme-argon.ipk <url> && opkg install /tmp/luci-theme-argon.ipk
            ```
          files: dist/*.ipk
